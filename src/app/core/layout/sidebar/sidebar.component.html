<aside 
  class="h-full fixed md:relative inset-y-0 left-0 bg-[#0A0A0A] border-r border-gray-800 flex flex-col transition-all duration-300 ease-in-out shadow-2xl md:shadow-none whitespace-nowrap overflow-hidden"
  [ngClass]="{
    'w-64': !layoutState.isSidebarCollapsed(),
    'w-20': layoutState.isSidebarCollapsed(),
    '-translate-x-full md:translate-x-0': !layoutState.isMobileSidebarOpen(),
    'translate-x-0': layoutState.isMobileSidebarOpen()
  }">
  
  <div class="h-16 flex items-center px-6 border-b border-gray-800">
    <div class="w-8 h-8 bg-white text-black rounded flex-shrink-0 flex items-center justify-center mr-3">
      <i class="pi pi-bolt text-sm"></i>
    </div>
    <span class="text-lg font-bold text-white tracking-wide uppercase transition-opacity duration-200"
          [class.opacity-0]="layoutState.isSidebarCollapsed()">Rivio</span>
  </div>

  <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto custom-scrollbar overflow-x-hidden">
    
    @for (item of navItems; track item.route) {
      <a 
        [routerLink]="item.route" 
        routerLinkActive="bg-white/10 text-white border-white" 
        [routerLinkActiveOptions]="{exact: false}"
        (click)="layoutState.closeMobileSidebar()"
        class="flex items-center gap-3 px-3 py-3 rounded-lg border-l-2 border-transparent text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all cursor-pointer"
        [title]="layoutState.isSidebarCollapsed() ? item.label : ''">
        <i class="pi {{ item.icon }} text-lg w-5 text-center flex-shrink-0"></i> 
        <span class="transition-opacity duration-200" [class.opacity-0]="layoutState.isSidebarCollapsed()">
          {{ item.label }}
        </span>
      </a>
    }

    <div class="my-4 border-t border-gray-800 mx-3"></div>

    <div>
      <button 
        (click)="toggleSelfService()" 
        class="w-full flex items-center justify-between px-3 py-3 rounded-lg border-l-2 border-transparent text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all cursor-pointer"
        [title]="layoutState.isSidebarCollapsed() ? 'Employee Self Service' : ''">
        
        <div class="flex items-center gap-3">
          <i class="pi pi-user text-blue-500 text-lg w-5 text-center flex-shrink-0"></i>
          <span class="transition-opacity duration-200" [class.opacity-0]="layoutState.isSidebarCollapsed()">
            Self Service
          </span>
        </div>
        
        <i class="pi text-xs transition-transform duration-300" 
           [ngClass]="{
             'pi-chevron-down': isSelfServiceOpen(), 
             'pi-chevron-right': !isSelfServiceOpen(), 
             'opacity-0 hidden': layoutState.isSidebarCollapsed()
           }"></i>
      </button>

      <div 
        class="overflow-hidden transition-all duration-300 ease-in-out" 
        [style.maxHeight]="isSelfServiceOpen() && !layoutState.isSidebarCollapsed() ? '200px' : '0px'">
        <div class="pl-10 pr-3 py-2 flex flex-col gap-1 mt-1">
          @for (sub of selfServiceItems; track sub.route) {
            <a 
              [routerLink]="sub.route"
              routerLinkActive="text-white bg-white/10"
              (click)="layoutState.closeMobileSidebar()"
              class="block px-3 py-2 rounded-md text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-colors">
              {{ sub.label }}
            </a>
          }
        </div>
      </div>
    </div>

  </nav>

  <div class="hidden md:flex p-4 border-t border-gray-800 justify-end">
    <button 
      (click)="layoutState.toggleSidebar()"
      class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 text-gray-400 hover:text-white hover:bg-white/10 transition-colors">
      <i class="pi" [ngClass]="layoutState.isSidebarCollapsed() ? 'pi-angle-right' : 'pi-angle-left'"></i>
    </button>
  </div>
</aside>
