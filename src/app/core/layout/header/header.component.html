<header class="h-16 bg-white/60 backdrop-blur-xl border-b border-white flex items-center justify-between px-6 lg:px-8 sticky top-0 z-30 shadow-[0_4px_20px_rgba(0,0,0,0.01)]">
  
  <div class="flex items-center gap-4">
    <button 
      (click)="layoutState.toggleMobileSidebar()"
      class="md:hidden text-slate-500 hover:text-slate-900 focus:outline-none transition-colors">
      <i class="pi pi-bars text-xl"></i>
    </button>
    
  </div>

  <div class="flex items-center gap-4 sm:gap-6">
    

    <div class="hidden sm:block h-6 w-px bg-white/80"></div>

    <div class="flex items-center gap-3">
      <div class="flex flex-col items-end">
        <span class="text-sm font-bold text-slate-800 leading-none mb-1">{{ authState.currentUser() }}</span>
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide leading-none">
          UID: {{ authState.employeeProfileId() }}
        </span>
      </div>
      <div class="w-10 h-10 bg-white border border-white rounded-xl shadow-sm flex items-center justify-center cursor-pointer hover:shadow-md transition-all hover:-translate-y-0.5">
        <i class="pi pi-user text-indigo-500 text-lg"></i>
      </div>
    </div>

    <div class="h-6 w-px bg-white/80"></div>

    <button (click)="logout()" class="text-slate-400 hover:text-pink-500 hover:bg-pink-500/10 p-2 rounded-xl transition-all" title="Sign Out">
      <i class="pi pi-sign-out text-xl"></i>
    </button>
  </div>
</header>
